<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat UI</title>
    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1e20;
            --text-color: #e3e3e3;
            --user-msg: #2b2c2f;
            --ai-msg: #1e1e20;
            --input-bg: #282a2d;
            --accent-color: #a8c7fa;
            --border-color: #444746;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Hlavní kontejner */
        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            height: 100%;
            position: relative;
        }

        /* Hlavička */
        .chat-header {
            padding: 15px 20px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Oblast pro zprávy */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Bublina zprávy */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .user-message {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Spodní panel pro zadávání textu */
        .chat-input-area {
            padding: 15px 20px;
            background-color: var(--bg-color);
        }

        .input-wrapper {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 6px 12px;
            align-items: center;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-color);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-color);
            resize: none;
            height: 24px;
            max-height: 200px;
            font-size: 1rem;
            padding: 2px 8px;
            outline: none;
        }

        button {
            background-color: var(--accent-color);
            color: #042f62;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Mobilní optimalizace (Media Queries) */
        @media (max-width: 600px) {
            .chat-messages {
                padding: 15px 10px;
                gap: 15px;
            }

            .message {
                max-width: 90%;
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            .chat-input-area {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">AI Asistent</div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">Ahoj! Jak vám mohu dnes pomoci?</div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Napište zprávu..." rows="1"></textarea>
                <button id="sendBtn">
                    <!-- Ikona šipky (SVG) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');

        // Automatické zvětšování textarea podle textu
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight - 10) + 'px';
        });

        // Funkce pro odeslání zprávy
        function sendMessage() {
            const text = textarea.value.trim();
            if (text === '') return;

            // Vytvoření zprávy uživatele
            appendMessage(text, 'user-message');
            textarea.value = '';
            textarea.style.height = '24px'; // Reset výšky

            // Simulace odpovědi AI (zde později napojíte skutečné API)
            setTimeout(() => {
                appendMessage('Tohle je automatická simulovaná odpověď.', 'ai-message');
            }, 800);
        }

        // Přidání bubliny do chatu
        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', className);
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            
            // Automatické odrolování dolů
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Event listenery pro odeslání
        sendBtn.addEventListener('click', sendMessage);

        textarea.addEventListener('keydown', (e) => {
            // Na PC odešle Enterem, na mobilu (Shift+Enter) skočí na nový řádek
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
