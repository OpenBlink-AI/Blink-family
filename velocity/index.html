<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink Velocity 92M | Již brzy</title>
    <style>
        :root {
            --bg: #030407;
            --card-bg: #0a0c13;
            --card-border: #181c2e;
            --spark-yellow: #facc15;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-block;
            background: rgba(250, 204, 21, 0.1);
            border: 1px solid rgba(250, 204, 21, 0.3);
            color: var(--spark-yellow);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 12px 0;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--card-border);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9rem;
            color: var(--spark-yellow);
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">OpenBlink v1.0 "Andromeda"</span>
        <h1>Blink Velocity 192M</h1>
        <p>Tento model bude k dispozici později.</p>
        <div class="status-box">
            ⚡ Příprava k vydání na HuggingFace
        </div>
    </div>

</body>
</html>
