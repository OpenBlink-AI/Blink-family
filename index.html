<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBlink Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Čistý Ollama / ChatGPT scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2f3042;
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #45475a;
        }
    </style>
</head>
<body class="bg-[#11111b] text-[#cdd6f4] font-sans h-screen flex overflow-hidden">

    <script>
        // ==========================================
        // KONFIGURACE (ZDE DOPLŇ SVÉ ÚDAJE)
        // ==========================================
        const SUPABASE_URL = "https://fjbrsxecfzqpygrzpzgb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqYnJzeGVjZnpxcHlncnpwemdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODgyNDgsImV4cCI6MjA5OTc2NDI0OH0.qLktKAeapaHMK7PLnLzVEv7X3akXMr8QSYjVje_rolQ";
        const RENDER_API_URL = "https://nanoblink-api-yxri.onrender.com/generate";

        // Inicializace Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let userProfile = null;
        let selectedModel = "nanoblink"; // Výchozí vybraný model

        // LocalStorage Chat Data
        let chatSessions = JSON.parse(localStorage.getItem('openblink_chats')) || [];
        let activeChatId = localStorage.getItem('openblink_active_chat_id') || null;
    </script>

    <aside class="w-72 bg-[#181825] border-r border-[#313244] flex flex-col justify-between p-4 z-10 shrink-0">
        <div class="flex flex-col h-full overflow-hidden">
            <div class="flex items-center gap-2.5 mb-6 px-2">
                <span class="text-xl">✨</span>
                <span class="font-bold text-base tracking-wide text-[#f5c2e7]">OpenBlink</span>
            </div>

            <button onclick="createNewChat()" class="w-full bg-[#313244] hover:bg-[#45475a] text-[#cdd6f4] text-sm font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition mb-4 shadow-sm">
                <span>+</span> Nový chat
            </button>

            <div class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1" id="chat-list">
                </div>
        </div>

        <div class="border-t border-[#313244] pt-4 mt-4 space-y-3">
            <div id="sidebar-limits" class="hidden text-xs text-[#a6adc8] bg-[#1e1e2e] border border-[#313244] px-3 py-2.5 rounded-xl flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-[#a6e3a1]"></span>
                    <span id="sidebar-plan-display" class="font-bold">FREE</span>
                </div>
                <span id="sidebar-usage-display" class="font-mono">0 / 100</span>
            </div>

            <div id="auth-btn-wrapper">
                <button onclick="openAuthModal()" class="w-full bg-[#cba6f7] hover:bg-[#b4befe] text-[#11111b] text-xs font-bold py-3 rounded-xl transition text-center">
                    Přihlásit se
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col justify-between bg-[#11111b] relative overflow-hidden">
        <header class="h-16 border-b border-[#1e1e2e] px-6 flex items-center justify-between bg-[#11111b]/80 backdrop-blur z-30">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#a6e3a1]"></span>
                <span class="text-xs font-semibold text-[#a6adc8] tracking-wider uppercase">Engine Online</span>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar max-w-3xl w-full mx-auto flex flex-col justify-start">
            </div>

        <footer class="p-6 bg-[#11111b]">
            <div class="max-w-3xl mx-auto space-y-4">
                
                <div class="relative flex flex-col bg-[#1e1e2e] rounded-2xl border border-[#313244] focus-within:border-[#cba6f7] transition-all shadow-2xl p-2.5">
                    
                    <textarea id="chat-input" disabled placeholder="Pro psaní zpráv se nejprve přihlas..." rows="1" class="w-full bg-transparent resize-none text-[#cdd6f4] placeholder-[#585b70] pt-2 pb-14 pl-4 pr-4 focus:outline-none text-sm custom-scrollbar min-h-[56px] max-h-32" oninput="adjustTextareaHeight(this)"></textarea>
                    
                    <div class="absolute bottom-3 right-3 flex items-center gap-2 z-20">
                        
                        <div class="relative">
                            <button id="model-select-btn" onclick="toggleModelDropdown()" class="bg-[#11111b] border border-[#313244] text-[#cdd6f4] px-3.5 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-2 hover:bg-[#181825] transition shadow-md">
                                <span id="active-model-name">✨ NanoBlink 6M</span>
                                <span class="text-[9px] text-[#a6adc8]">▼</span>
                            </button>
                            
                            <div id="model-dropdown" class="hidden absolute bottom-full right-0 mb-2.5 w-52 bg-[#1e1e2e] border border-[#313244] rounded-xl p-1.5 shadow-2xl space-y-1">
                                <button onclick="selectModel('nanoblink', '✨ NanoBlink 6M')" class="w-full text-left px-3 py-2 text-xs font-semibold rounded-lg bg-[#cba6f7] text-[#11111b] transition flex items-center justify-between">
                                    <span>✨ NanoBlink (6M)</span>
                                    <span class="text-[9px] font-bold">Aktivní</span>
                                </button>
                                <button disabled class="w-full text-left px-3 py-2 text-xs font-semibold rounded-lg text-[#585b70] cursor-not-allowed flex items-center justify-between" title="Připravujeme...">
                                    <span>⚡ TinyBlink</span>
                                    <span>🔒</span>
                                </button>
                                <button disabled class="w-full text-left px-3 py-2 text-xs font-semibold rounded-lg text-[#585b70] cursor-not-allowed flex items-center justify-between" title="Připravujeme...">
                                    <span>🔥 Blink</span>
                                    <span>🔒</span>
                                </button>
                            </div>
                        </div>

                        <button id="send-btn" disabled onclick="sendMessage()" class="bg-[#313244] text-[#585b70] px-5 py-2.5 rounded-xl text-xs font-semibold transition cursor-not-allowed shadow-md">
                            Odeslat
                        </button>
                    </div>
                </div>
                
                <p class="text-[10px] text-center text-[#585b70]">
                    OpenBlink může generovat nepřesnosti. Běží na tvém dedikovaném API na Renderu.
                </p>
            </div>
        </footer>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-[#1e1e2e] border border-[#313244] w-full max-w-sm rounded-2xl p-6 shadow-2xl relative space-y-4">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-[#a6adc8] hover:text-[#cdd6f4] text-lg">✕</button>
            
            <div class="text-center">
                <span class="text-2xl">🔐</span>
                <h3 class="text-lg font-bold text-[#cdd6f4] mt-2">Uživatelský účet</h3>
                <p class="text-xs text-[#a6adc8] mt-1">Zadej své přihlašovací údaje k platformě OpenBlink.</p>
            </div>

            <div class="space-y-3 pt-2">
                <input type="email" id="auth-email" placeholder="E-mail" class="w-full bg-[#11111b] border border-[#313244] text-[#cdd6f4] placeholder-[#585b70] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#cba6f7] transition">
                <input type="password" id="auth-password" placeholder="Heslo" class="w-full bg-[#11111b] border border-[#313244] text-[#cdd6f4] placeholder-[#585b70] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#cba6f7] transition">
            </div>

            <div class="flex gap-2.5 pt-2">
                <button onclick="handleLogin()" class="flex-1 bg-[#cba6f7] text-[#11111b] font-bold py-3 rounded-xl text-xs hover:bg-[#b4befe] transition">Přihlásit se</button>
                <button onclick="handleRegister()" class="flex-1 border border-[#cba6f7] text-[#cba6f7] font-bold py-3 rounded-xl text-xs hover:bg-[#cba6f7] hover:text-[#11111b] transition">Registrovat</button>
            </div>
        </div>
    </div>

    <script>
        // Sledování stavu přihlášení
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                currentUser = session.user;
                await fetchUserProfile();
                updateUIForLoggedIn();
            } else {
                currentUser = null;
                userProfile = null;
                updateUIForLoggedOut();
            }
            renderChatList();
            loadActiveChat();
        });

        // Načtení profilu
        async function fetchUserProfile() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            if (data) {
                userProfile = data;
                document.getElementById('sidebar-plan-display').innerText = userProfile.plan.toUpperCase();
                document.getElementById('sidebar-usage-display').innerText = `${userProfile.zpravy_dnes} / ${userProfile.limit_zprav}`;
            }
        }

        // Stavy uživatelského rozhraní
        function updateUIForLoggedIn() {
            closeAuthModal();
            document.getElementById('sidebar-limits').classList.remove('hidden');
            
            document.getElementById('auth-btn-wrapper').innerHTML = `
                <button onclick="handleLogout()" class="w-full bg-[#f38ba8]/10 text-[#f38ba8] hover:bg-[#f38ba8]/20 text-xs font-semibold py-3 rounded-xl transition">
                    Odhlásit se
                </button>
            `;

            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            input.disabled = false;
            input.placeholder = "Zeptej se modelu NanoBlink...";
            
            sendBtn.disabled = false;
            sendBtn.className = "bg-[#cba6f7] text-[#11111b] hover:bg-[#b4befe] px-5 py-2.5 rounded-xl text-xs font-semibold transition shadow-md cursor-pointer";
        }

        function updateUIForLoggedOut() {
            document.getElementById('sidebar-limits').classList.add('hidden');
            
            document.getElementById('auth-btn-wrapper').innerHTML = `
                <button onclick="openAuthModal()" class="w-full bg-[#cba6f7] hover:bg-[#b4befe] text-[#11111b] text-xs font-bold py-3 rounded-xl transition text-center">
                    Přihlásit se
                </button>
            `;

            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            input.disabled = true;
            input.placeholder = "Pro psaní zpráv se nejprve přihlas...";
            input.value = "";
            
            sendBtn.disabled = true;
            sendBtn.className = "bg-[#313244] text-[#585b70] px-5 py-2.5 rounded-xl text-xs font-semibold transition cursor-not-allowed shadow-md";
        }

        // Modální okno a výběr modelů
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        function toggleModelDropdown() { document.getElementById('model-dropdown').classList.toggle('hidden'); }

        function selectModel(modelKey, displayName) {
            selectedModel = modelKey;
            document.getElementById('active-model-name').innerText = displayName;
            document.getElementById('model-dropdown').classList.add('hidden');
        }

        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('model-dropdown');
            const btn = document.getElementById('model-select-btn');
            if (dropdown && btn && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // Autentizace
        async function handleRegister() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Prosím, vyplň e-mail i heslo.");
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert("Chyba: " + error.message);
            else alert("Registrace úspěšná! Nyní se můžeš přihlásit.");
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Prosím, vyplň e-mail i heslo.");
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Chyba: " + error.message);
        }

        async function handleLogout() {
            await supabase.auth.signOut();
        }

        // Výška textarea
        function adjustTextareaHeight(el) {
            el.style.height = "auto";
            el.style.height = (el.scrollHeight) + "px";
        }

        // ==========================================
        // SPRÁVA CHATŮ (LOCAL STORAGE HISTORIE)
        // ==========================================
        
        // Vytvoření nového chatu
        function createNewChat() {
            const newChat = {
                id: "chat-" + Date.now(),
                title: "Nový rozhovor",
                messages: []
            };
            chatSessions.unshift(newChat);
            saveChatsToStorage();
            switchChat(newChat.id);
        }

        // Přepnutí chatu
        function switchChat(chatId) {
            activeChatId = chatId;
            localStorage.setItem('openblink_active_chat_id', chatId);
            renderChatList();
            loadActiveChat();
        }

        // Smazání chatu
        function deleteChat(chatId, event) {
            event.stopPropagation(); // Zabrání přepnutí na mazaný chat
            chatSessions = chatSessions.filter(c => c.id !== chatId);
            if (activeChatId === chatId) {
                activeChatId = chatSessions.length > 0 ? chatSessions[0].id : null;
                localStorage.setItem('openblink_active_chat_id', activeChatId);
            }
            saveChatsToStorage();
            renderChatList();
            loadActiveChat();
        }

        // Uložení
        function saveChatsToStorage() {
            localStorage.setItem('openblink_chats', JSON.stringify(chatSessions));
        }

        // Vykreslení seznamu v levém panelu
        function renderChatList() {
            const chatListEl = document.getElementById('chat-list');
            chatListEl.innerHTML = "";

            if (chatSessions.length === 0) {
                chatListEl.innerHTML = `<p class="text-xs text-[#585b70] text-center pt-8">Žádná historie konverzací</p>`;
                return;
            }

            chatSessions.forEach(chat => {
                const isActive = chat.id === activeChatId;
                const activeClass = isActive ? "bg-[#313244] text-[#cdd6f4]" : "hover:bg-[#1e1e2e]/50 text-[#a6adc8]";
                
                const chatItem = `
                    <div onclick="switchChat('${chat.id}')" class="group flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-semibold cursor-pointer transition ${activeClass}">
                        <div class="flex items-center gap-2 truncate">
                            <span>💬</span>
                            <span class="truncate pr-2">${chat.title}</span>
                        </div>
                        <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 text-[#f38ba8] hover:text-[#eba0ac] text-[11px] px-1 transition">
                            ✕
                        </button>
                    </div>
                `;
                chatListEl.insertAdjacentHTML('beforeend', chatItem);
            });
        }

        // Načtení zpráv vybraného chatu do okna
        function loadActiveChat() {
            const chatMessagesEl = document.getElementById('chat-messages');
            chatMessagesEl.innerHTML = "";

            if (!activeChatId || chatSessions.length === 0) {
                // Výchozí prázdný stav
                chatMessagesEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-1 py-12 text-center">
                        <span class="text-4xl mb-3">✨</span>
                        <h2 class="text-base font-bold text-[#cdd6f4]">OpenBlink Chat Interface</h2>
                        <p class="text-xs text-[#a6adc8] mt-1 max-w-sm">Založ nový chat v levém panelu a začni bezpečně komunikovat s modelem.</p>
                    </div>
                `;
                return;
            }

            const activeChat = chatSessions.find(c => c.id === activeChatId);
            if (activeChat && activeChat.messages.length > 0) {
                activeChat.messages.forEach(msg => {
                    appendMessageUI(msg.sender, msg.text, msg.avatar, msg.textClass);
                });
            } else {
                // Uvítací zpráva pro nově otevřený prázdný chat
                chatMessagesEl.innerHTML = `
                    <div class="flex gap-4 items-start py-4 max-w-2xl">
                        <div class="w-8 h-8 rounded-full bg-[#1e1e2e] border border-[#313244] flex items-center justify-center text-sm shadow">✨</div>
                        <div class="space-y-1">
                            <p class="text-xs text-[#a6adc8] font-medium">OpenBlink AI</p>
                            <div class="text-sm text-[#cdd6f4] leading-relaxed">
                                Ahoj! Tento nový chat je připraven k použití. Zeptej se na cokoliv, co tě zajímá ohledně platformy NanoBlink.
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // ==========================================
        // ODESÍLÁNÍ ZPRÁV A API INTEGRACE
        // ==========================================
        async function sendMessage() {
            if (!activeChatId) {
                createNewChat();
            }

            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // Kontrola denního limitu
            if (userProfile && userProfile.zpravy_dnes >= userProfile.limit_zprav) {
                alert("Vyčerpal jsi svůj dnešní limit zpráv!");
                return;
            }

            // Vyčištění a reset
            input.value = "";
            input.style.height = "56px";

            const activeChat = chatSessions.find(c => c.id === activeChatId);

            // Pokud jde o první zprávu v chatu, přejmenujeme chat podle textu zprávy
            if (activeChat.messages.length === 0) {
                activeChat.title = message.length > 20 ? message.substring(0, 18) + "..." : message;
                renderChatList();
            }

            // Uložení uživatelské zprávy
            const userMsg = { sender: "Uživatel", text: message, avatar: "👤", textClass: "text-[#cdd6f4]" };
            activeChat.messages.push(userMsg);
            saveChatsToStorage();

            // Vykreslení do UI
            appendMessageUI(userMsg.sender, userMsg.text, userMsg.avatar, userMsg.textClass);

            // Dočasný loader
            const loadingId = appendMessageUI("OpenBlink AI", "Generuji odpověď...", "✨", "text-[#585b70]");

            try {
                const response = await fetch(RENDER_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        temperature: 0.7,
                        max_tokens: 120
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data && data.response) {
                    const aiMsg = { sender: "OpenBlink AI", text: data.response, avatar: "✨", textClass: "text-[#cdd6f4]" };
                    activeChat.messages.push(aiMsg);
                    saveChatsToStorage();
                    
                    appendMessageUI(aiMsg.sender, aiMsg.text, aiMsg.avatar, aiMsg.textClass);

                    // Navýšení limitu v Supabase
                    if (currentUser && userProfile) {
                        const { error } = await supabase
                            .from('profiles')
                            .update({ zpravy_dnes: userProfile.zpravy_dnes + 1 })
                            .eq('id', currentUser.id);
                        
                        if(!error) await fetchUserProfile();
                    }
                } else {
                    appendMessageUI("OpenBlink AI", "Došlo k chybě při zpracování odpovědi.", "✨", "text-[#f38ba8]");
                }

            } catch (error) {
                console.error(error);
                document.getElementById(loadingId).remove();
                appendMessageUI("Systém", "Nepodařilo se navázat spojení se serverem Render.", "⚠️", "text-[#f38ba8]");
            }
        }

        // Pomocná funkce vykreslení zprávy na obrazovku
        function appendMessageUI(sender, text, avatar, textClass) {
            const chatMessages = document.getElementById('chat-messages');
            const messageId = "msg-" + Date.now() + Math.random().toString(36).substr(2, 5);

            const msgHtml = `
                <div class="flex gap-4 items-start py-4 border-b border-[#1e1e2e]/30 max-w-2xl w-full" id="${messageId}">
                    <div class="w-8 h-8 rounded-full bg-[#1e1e2e] border border-[#313244] flex items-center justify-center text-sm shadow shrink-0">${avatar}</div>
                    <div class="space-y-1 overflow-hidden">
                        <p class="text-xs text-[#a6adc8] font-medium">${sender}</p>
                        <div class="text-sm ${textClass} leading-relaxed whitespace-pre-line break-words">${text}</div>
                    </div>
                </div>
            `;
            
            chatMessages.insertAdjacentHTML('beforeend', msgHtml);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageId;
        }

        // Klávesa Enter
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Inicializační spuštění na startu
        if (chatSessions.length > 0 && !activeChatId) {
            activeChatId = chatSessions[0].id;
        }
        renderChatList();
        loadActiveChat();
    </script>
</body>
</html>
